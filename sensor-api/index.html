<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor Dashboard</title>
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2128;
      --border:     #30363d;
      --border2:    #21262d;
      --text:       #e6edf3;
      --muted:      #7d8590;
      --blue:       #58a6ff;
      --green:      #3fb950;
      --green-dim:  rgba(46, 160, 67, 0.12);
      --green-ring: rgba(46, 160, 67, 0.35);
      --red:        #ff7b72;
      --red-dim:    rgba(218, 54, 51, 0.10);
      --red-ring:   rgba(218, 54, 51, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    header h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--green);
    }

    .live-badge.offline { color: var(--muted); }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    .live-badge.offline .live-dot {
      background: var(--muted);
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.6); }
      50%       { opacity: 0.5; box-shadow: 0 0 0 5px rgba(63, 185, 80, 0);  }
    }

    /* ── Main ───────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Error banner ───────────────────────────────────── */
    #errorBanner {
      display: none;
      background: rgba(218, 54, 51, 0.08);
      border: 1px solid var(--red-ring);
      border-radius: 6px;
      padding: 11px 16px;
      margin-bottom: 20px;
      color: var(--red);
      font-size: 0.85rem;
    }

    #errorBanner.show { display: block; }

    /* ── Stats ──────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.c-red   { color: var(--red); }
    .stat-value.c-green { color: var(--green); }
    .stat-value.c-muted { font-size: 0.95rem; font-weight: 400; color: var(--muted); }

    /* ── Controls ───────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn:hover       { border-color: var(--blue); color: var(--blue); }
    .filter-btn.active      { background: var(--blue); border-color: var(--blue); color: #0d1117; font-weight: 700; }

    /* ── Table ──────────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead { background: var(--surface2); }

    th {
      text-align: left;
      padding: 11px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border2);
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }

    tr.row-anomaly { background: var(--red-dim); }
    tr.row-anomaly:hover { background: rgba(218, 54, 51, 0.16); }

    tr.row-normal  { background: var(--green-dim); }
    tr.row-normal:hover { background: rgba(46, 160, 67, 0.18); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge-anomaly {
      color: var(--red);
      background: rgba(218, 54, 51, 0.18);
      border: 1px solid var(--red-ring);
    }

    .badge-normal {
      color: var(--green);
      background: rgba(46, 160, 67, 0.18);
      border: 1px solid var(--green-ring);
    }

    .mono {
      font-family: 'SF Mono', Consolas, 'Liberation Mono', monospace;
    }

    td.col-ts { color: var(--muted); font-size: 0.78rem; }

    .empty {
      text-align: center;
      padding: 52px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>Sensor Dashboard <span>/ recycling depot</span></h1>
  <div class="live-badge" id="liveBadge">
    <div class="live-dot"></div>
    <span id="liveLabel">LIVE</span>
  </div>
</header>

<main>
  <div id="errorBanner"></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Readings</div>
      <div class="stat-value" id="sTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Anomalies</div>
      <div class="stat-value c-red" id="sAnomalies">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Normal</div>
      <div class="stat-value c-green" id="sNormal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last Updated</div>
      <div class="stat-value c-muted" id="sUpdated">—</div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn"        data-f="anomaly">Anomalies only</button>
    <button class="filter-btn"        data-f="normal">Normal only</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Sensor ID</th>
          <th>Weight (kg)</th>
          <th>Item Type</th>
          <th>Status</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  const API = (location.hostname === 'localhost' ||
               location.hostname === '127.0.0.1' ||
               location.protocol === 'file:')
               ? 'http://localhost:8080/sensors'
               : 'http://34.207.79.250:8080/sensors';
  const INTERVAL = 5000;

  let rows   = [];
  let filter = 'all';

  const tbody     = document.getElementById('tbody');
  const errBanner = document.getElementById('errorBanner');
  const liveBadge = document.getElementById('liveBadge');
  const liveLabel = document.getElementById('liveLabel');
  const sTotal    = document.getElementById('sTotal');
  const sAnomalies= document.getElementById('sAnomalies');
  const sNormal   = document.getElementById('sNormal');
  const sUpdated  = document.getElementById('sUpdated');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  async function poll() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      rows = await res.json();
      setOnline(true);
      hideError();
      updateStats();
      render();
    } catch (err) {
      setOnline(false);
      showError(`Cannot reach ${API} — ${err.message}`);
    }
  }

  function updateStats() {
    const n = rows.filter(r => r.topic === 'anamoly').length;
    sTotal.textContent     = rows.length;
    sAnomalies.textContent = n;
    sNormal.textContent    = rows.length - n;
    sUpdated.textContent   = new Date().toLocaleTimeString();
  }

  function render() {
    const visible = rows.filter(r => {
      if (filter === 'anamoly') return r.topic === 'anamoly';
      if (filter === 'normal')  return r.topic !== 'anamoly';
      return true;
    });

    if (!visible.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">No readings match this filter.</td></tr>`;
      return;
    }

    tbody.innerHTML = visible.map(r => {
      const anomaly = r.topic === 'anamoly';
      return `<tr class="${anomaly ? 'row-anomaly' : 'row-normal'}">
        <td class="mono">${esc(r.sensor_id)}</td>
        <td class="mono">${r.weight_kg.toFixed(2)}</td>
        <td>${esc(r.item_type)}</td>
        <td><span class="badge ${anomaly ? 'badge-anomaly' : 'badge-normal'}">${anomaly ? 'Anomaly' : 'Normal'}</span></td>
        <td class="col-ts mono">${fmt(r.timestamp)}</td>
      </tr>`;
    }).join('');
  }

  function fmt(ts) {
    try {
      return new Date(ts).toLocaleString(undefined, {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
    } catch { return ts; }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function setOnline(on) {
    liveBadge.classList.toggle('offline', !on);
    liveLabel.textContent = on ? 'LIVE' : 'OFFLINE';
  }

  function showError(msg) {
    errBanner.textContent = msg;
    errBanner.classList.add('show');
  }

  function hideError() {
    errBanner.classList.remove('show');
  }

  poll();
  setInterval(poll, INTERVAL);
</script>
</body>
</html>
